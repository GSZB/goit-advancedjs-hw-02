<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Promise Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
      }

      .form {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 350px;
      }

      .form label {
        display: flex;
        flex-direction: column;
        gap: 4px;
        font-size: 1rem;
      }

      .form input[type='number'] {
        padding: 8px 10px;
        font-size: 1rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        width: 100%;
      }

      fieldset {
        border: 1px solid #ccc;
        border-radius: 4px;
        padding: 10px 16px;
        display: flex;
        justify-content: space-around;
      }

      legend {
        font-size: 0.9rem;
        padding: 0 4px;
      }

      fieldset label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-right: 20px;
        font-size: 1rem;
        cursor: pointer;
      }

      .form button[type='submit'] {
        padding: 8px;
        font-size: 1rem;
        border: 1px solid #999;
        border-radius: 4px;
        background: #f5f5f5;
        cursor: pointer;
      }

      .form button[type='submit']:hover {
        background: #e0e0e0;
      }
    </style>
    <script type="module" crossorigin src="/goit-advancedjs-hw-02/2-snackbar.js"></script>
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-BbbuE1sJ.js">
    <link rel="stylesheet" crossorigin href="/goit-advancedjs-hw-02/assets/vendor-CZjNVMTf.css">
  </head>
  <body>
    <form class="form">
      <label>
        Delay (ms)
        <input type="number" name="delay" required />
      </label>

      <fieldset>
        <legend>State</legend>
        <label>
          <input type="radio" name="state" value="fulfilled" required />
          Fulfilled
        </label>
        <label>
          <input type="radio" name="state" value="rejected" />
          Rejected
        </label>
      </fieldset>

      <button type="submit">Create notification</button>
    </form>

  </body>
</html>
